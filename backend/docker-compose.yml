services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
      - svp_storage:/var/www/html/storage
      - svp_backups:/var/www/html/storage/app/backups
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-simplevpbot}
      DB_USERNAME: ${DB_USERNAME:-svp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - svp

  web:
    image: nginx:1.27-alpine
    ports:
      - "${SVP_HTTP_PORT:-8080}:80"
      - "${SVP_HTTPS_PORT:-8443}:443"
    volumes:
      - .:/var/www/html:ro
      - ../assets/dashboard/dist:/var/www/dashboard:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - svp

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-simplevpbot}
      MYSQL_USER: ${DB_USERNAME:-svp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - svp_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-svp}", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - svp

  redis:
    image: redis:7-alpine
    volumes:
      - svp_redis:/data
    networks:
      - svp

  queue-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan queue:work redis --sleep=1 --tries=3
    volumes:
      - .:/var/www/html
      - svp_storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-simplevpbot}
      DB_USERNAME: ${DB_USERNAME:-svp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - redis
    networks:
      - svp
    profiles:
      - workers

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-simplevpbot}
      DB_USERNAME: ${DB_USERNAME:-svp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
    depends_on:
      - app
    networks:
      - svp

  relay:
    build:
      context: ../relay-server
      dockerfile: Dockerfile
    profiles:
      - relay
    environment:
      RELAY_MASTER_SECRET: ${RELAY_MASTER_SECRET:-changeme}
      RELAY_DATA_DIR: /data
    volumes:
      - svp_relay:/data
    networks:
      - svp

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles:
      - observability
    volumes:
      - ../docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - svp

  grafana:
    image: grafana/grafana:11.2.0
    profiles:
      - observability
    volumes:
      - ../docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - svp

volumes:
  svp_mysql:
  svp_redis:
  svp_storage:
  svp_backups:
  svp_relay:

networks:
  svp:
    driver: bridge
