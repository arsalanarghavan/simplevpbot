# Production TLS example — include from default.conf or separate server block.
# Replace example.com and certificate paths with your certbot/Let's Encrypt paths.

server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 32m;
    root /var/www/dashboard;
    index index.html;

    include /etc/nginx/snippets/svp-laravel-locations.conf;
}

server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}
